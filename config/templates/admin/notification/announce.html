{% extends "admin/base_site.html" %}
{% block content %}
<h1>공지 푸시 알림 발송</h1>
{% if messages %}
  {% for message in messages %}
    <p class="success">{{ message }}</p>
  {% endfor %}
{% endif %}
<form method="post">
  {% csrf_token %}
  <table>{{ form.as_table }}</table>
  <input type="submit" value="전체 발송">
</form>
{% endblock %}
